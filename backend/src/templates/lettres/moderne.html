<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @page { size: A4; margin: 0; }
        body {
            width: 210mm;
            height: 297mm;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="font-sans bg-white">
    <div class="h-full flex">
        
        <!-- BARRE LATÉRALE BLEUE -->
        <div class="w-2 bg-blue-600"></div>
        
        <!-- CONTENU -->
        <div class="flex-1 px-16 py-14 flex flex-col justify-between">
            
            <!-- HEADER -->
            <div>
                <div class="text-xs text-gray-600 leading-relaxed whitespace-pre-line mb-8">
                    {{content.coordonnees}}
                </div>
                
                <div class="text-xs text-gray-700 mb-8">
                    <p class="font-bold text-blue-600">{{content.entete.company}}</p>
                    <p class="mt-4 text-gray-500">{{content.entete.date}}</p>
                </div>
                
                <div class="mb-8">
                    <p class="text-sm font-bold text-blue-600 uppercase tracking-wide">
                        {{content.entete.objet}}
                    </p>
                </div>
            </div>
            
            <!-- CORPS -->
            <div class="text-sm text-gray-800 leading-relaxed space-y-4 flex-1">
                <p class="font-semibold">Madame, Monsieur,</p>
                
                <p>{{content.paragraphe1}}</p>
                <p>{{content.paragraphe2}}</p>
                <p>{{content.paragraphe3}}</p>
                <p>{{content.paragraphe4}}</p>
            </div>
            
            <!-- SIGNATURE -->
            <div class="text-sm text-gray-700 mt-8">
                <p>Bien cordialement,</p>
                <p class="mt-4 font-bold text-blue-600">{{content.signature}}</p>
            </div>
        </div>
    </div>
</body>
</html>
